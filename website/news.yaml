#  Hey frérot je viens de voir qu'on peux écrire des commentaires dans un fichier yaml! Chouette!
#  voila un exemple d'objet yaml correctement écris avec quelques explications.
#
#      - date: 1 janvier 2026            <---- ne pas mettre de caractères spéciaux (met juste des lettres et des chiffres)
#        titre_lien: Mon exposition      <---- ne pas mettre de caractères spéciaux (met juste des lettres et des chiffres)
#        lien: https://lien_complet.fr   <---- avec bien https:// ou http:// pas www.lien_complet.fr ni lien_complet.fr 
#        description: Exposition         <---- ne pas mettre de caractères spéciaux (met juste des lettres et des chiffres)
#        image: "img/news/image_avec_un_nom_sans_espaces_moi_j'aime_bien_remplacer_les_espaces_par_un_tiret_du_bas.jpg" 
#        taille_image: "50vh"            <---- tu peux ajuster la taille de l'image ici
#
#  Ce qui bloque souvent pour toi c'est la syntaxe du nom de fichier de l'image! Regarde l'exemple. Attention, c'est la meme sur ton fichier, remplace les
#  espaces par des tiret du bas. En general, pour tout fichier meme en dehors de yaml, c'est bien de faire sa pour garantir que l'ordinateur ne pense pas
#  que sa peux être deux fichiers, ou plus!
#
#  Aussi, très important, l'indentation. Garde bien les objets aligné, un espace de travers et l'objet ne marchera pas
#  Bisous!
#
# Garde le 1er objet la pour pouvoir copier coller facilou! Désolè j'ai du le passer en commentaire donc tu devras:
# -le selectionner, puis faire la combinaison de touche  (les 3 en meme temp, en appuyant dans l'ordre ci dessous)
# - Ctrl Majuscule :       pour le décommenter, pareil pour le recommenter.




